packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  "@stellar/stellar-sdk": false
  blake-hash: false
  bufferutil: true
  esbuild: true
  prisma: true
  protobufjs: true
  tiny-secp256k1: false
  usb: false
  utf-8-validate: true

# mpl-core/umi puxavam @noble/hashes v2 (2.2.0), que removeu o subpath /sha3 e quebrava.
# Override CIRÚRGICO: só as resoluções 2.x viram 1.8.0 (tem /sha3). O 1.4.0 do
# ethereum-cryptography (que precisa de /_assert) e os 1.7.x ficam intactos.
overrides:
  "@noble/hashes@^2.0.0": "1.8.0"

# NOTA: programs/ é um workspace Cargo/Anchor (Rust) e fica PROPOSITALMENTE fora do pnpm.
# Nunca adicione "programs/**" aqui — senão o pnpm tenta tratar crates Rust como pacotes node.
