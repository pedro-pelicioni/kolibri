databases:
  - name: kolibri-db
    databaseName: kolibri
    user: kolibri
    plan: free

services:
  # ---------------- API (Fastify + Prisma) ----------------
  - type: web
    name: kolibri-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @kolibri/api exec prisma generate && pnpm --filter @kolibri/api exec prisma migrate deploy
    startCommand: pnpm --filter @kolibri/api exec tsx src/server.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kolibri-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SOLANA_CLUSTER
        value: devnet
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: PROGRAM_ID
        value: Bybi3nTRCF1CU15BvwLnMA4B27YGs5BuoVXeFzFxfqnF
      - key: SERVICE_KEYPAIR_JSON
        sync: false
      - key: API_PUBLIC_URL
        value: https://kolibri-api-10co.onrender.com
      - key: APP_DOMAIN
        value: kolibri-web.onrender.com
      - key: PUBLIC_PASSPORT_BASE_URL
        value: https://kolibri-web.onrender.com/passport

  # ---------------- Web (Vite — site estático) ----------------
  - type: web
    name: kolibri-web
    runtime: static
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @kolibri/web build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://kolibri-api-10co.onrender.com
      - key: VITE_SOLANA_CLUSTER
        value: devnet
      - key: VITE_SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: VITE_PROGRAM_ID
        value: Bybi3nTRCF1CU15BvwLnMA4B27YGs5BuoVXeFzFxfqnF

  # ---------------- Landing (site institucional, HTML estático puro) ----------------
  # Sem build: HTML/CSS/JS já prontos na pasta landing-page/. O botão "Acessar a
  # plataforma" leva para o app (kolibri-web). Render publica a pasta direto na CDN.
  - type: web
    name: kolibri-landing
    runtime: static
    rootDir: .
    buildCommand: "echo 'sem build: arquivos estáticos servidos direto da pasta landing-page'"
    staticPublishPath: landing-page
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
